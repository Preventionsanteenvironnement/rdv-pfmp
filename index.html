<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Rendez-vous PFMP</title>
  <style>
    :root{
      --bg1:#2f7d6b; --bg2:#356a93;
      --ink:#1c2530; --soft:#69757f; --line:#e7ecf1;
      --accent:#2f7d6b; --card:#ffffff; --ok:#2f9e6b;
      --shadow:0 10px 40px rgba(20,40,55,.18);
    }
    *{box-sizing:border-box;}
    html,body{margin:0;}
    body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--ink); background:linear-gradient(150deg,var(--bg1),var(--bg2)); min-height:100vh;
      display:flex; align-items:flex-start; justify-content:center; padding:24px 16px 48px; -webkit-font-smoothing:antialiased; }
    .sheet{ width:100%; max-width:480px; background:var(--card); border-radius:22px;
      box-shadow:var(--shadow); overflow:hidden; animation:pop .45s cubic-bezier(.16,.84,.44,1) both; }
    @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.985);}to{opacity:1;transform:none;}}

    .top{ background:linear-gradient(150deg,var(--bg1),var(--bg2)); color:#fff; padding:18px 22px 22px; }
    .top.invit{ background:linear-gradient(150deg,#b06f2b,#9a4f8f); }
    .back{ display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,.16); color:#fff; border:none;
      border-radius:999px; padding:7px 14px 7px 11px; font:inherit; font-size:.82rem; cursor:pointer; text-decoration:none; margin-bottom:14px; }
    .back:hover{ background:rgba(255,255,255,.26); }
    .top .label{ font-size:.72rem; letter-spacing:.16em; text-transform:uppercase; opacity:.85; }
    .top h1{ margin:4px 0 0; font-size:1.3rem; }
    .who{ display:flex; align-items:center; gap:13px; margin-top:12px; }
    .avatar{ width:46px; height:46px; border-radius:50%; background:rgba(255,255,255,.22); display:grid; place-items:center; font-weight:700; font-size:1rem; flex:none; }
    .who .name{ font-weight:650; font-size:1.02rem; } .who .role{ font-size:.82rem; opacity:.85; }

    .body{ padding:22px 22px 26px; }
    .intro{ font-size:.97rem; line-height:1.5; margin:0 0 18px; } .intro strong{ color:var(--accent); }

    .recap{ display:grid; gap:1px; background:var(--line); border:1px solid var(--line); border-radius:14px; overflow:hidden; margin-bottom:20px; }
    .recap .row{ background:#fff; display:flex; gap:10px; padding:11px 14px; font-size:.9rem; }
    .recap .k{ color:var(--soft); min-width:84px; } .recap .v{ font-weight:550; }

    .ask{ font-weight:650; font-size:1rem; margin:0 0 6px; }
    .sub{ font-size:.82rem; color:var(--soft); margin:0 0 12px; }

    .field{ margin-bottom:14px; }
    .field label{ display:block; font-size:.82rem; font-weight:600; color:var(--soft); margin-bottom:6px; }
    .field input, .field select, .field textarea{ width:100%; font:inherit; padding:11px 13px; border:1.5px solid var(--line); border-radius:12px; background:#fff; color:var(--ink); }
    .field textarea{ min-height:96px; resize:vertical; line-height:1.45; }
    .field .hint{ font-size:.74rem; color:var(--soft); margin-top:5px; }
    .two{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .three{ display:grid; grid-template-columns:1.25fr 1fr 1fr; gap:8px; align-items:end; }

    .seg{ display:flex; flex-wrap:wrap; gap:8px; }
    .seg button{ border:1.5px solid var(--line); background:#fff; color:var(--ink); border-radius:11px; padding:9px 14px; font:inherit; font-size:.9rem; cursor:pointer; transition:.13s; }
    .seg button:hover{ border-color:var(--accent); } .seg button.on{ border-color:var(--accent); background:var(--accent); color:#fff; }

    .jour-list{ display:grid; gap:8px; margin:8px 0 4px; }
    .jour-item{ background:#fff; border:1px solid var(--line); border-left:5px solid var(--jc,#999); border-radius:11px; padding:10px 12px; font-size:.9rem; display:flex; align-items:center; gap:10px; }
    .jour-item .meta2{ font-size:.78rem; color:var(--soft); }
    .jour-item .x{ margin-left:auto; border:none; background:none; color:var(--soft); cursor:pointer; font-size:1.15rem; }
    .addbtn{ width:100%; background:rgba(47,125,107,.12); color:var(--accent); border:none; border-radius:11px; padding:12px; font:inherit; font-weight:650; cursor:pointer; margin-top:8px; }

    .day{ border:1px solid var(--line); border-left:5px solid var(--jc,var(--accent)); border-radius:16px; padding:13px 15px; margin-bottom:13px; }
    .day-h{ display:flex; align-items:center; gap:12px; margin-bottom:11px; }
    .day-h .cal{ width:44px; height:44px; border-radius:11px; flex:none; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; line-height:1; }
    .day-h .cal .d{ font-size:1.1rem; font-weight:700; } .day-h .cal .m{ font-size:.6rem; text-transform:uppercase; letter-spacing:.05em; margin-top:2px; }
    .day-h .lbl{ font-weight:650; } .day-h .win{ font-size:.8rem; color:var(--soft); margin-top:2px; }
    .chips{ display:flex; flex-wrap:wrap; gap:8px; }
    .chip{ position:relative; border:1.5px solid var(--line); background:#fff; color:var(--ink); border-radius:11px; padding:9px 13px; font:inherit; font-size:.9rem; cursor:pointer; transition:.12s; }
    .chip:hover{ border-color:var(--accent); } .chip.on{ color:#fff; border-color:transparent; }
    .chip .rk{ position:absolute; top:-8px; right:-8px; width:21px; height:21px; border-radius:50%; background:#fff; color:var(--ink); font-size:.72rem; font-weight:700; display:grid; place-items:center; box-shadow:0 1px 4px rgba(0,0,0,.18); border:2px solid currentColor; }
    .legend{ display:flex; flex-wrap:wrap; gap:10px; margin:2px 0 14px; font-size:.78rem; color:var(--soft); }
    .legend span{ display:inline-flex; align-items:center; gap:6px; } .legend i{ width:12px; height:12px; border-radius:4px; display:inline-block; }

    .cta{ width:100%; margin-top:18px; background:var(--accent); color:#fff; border:none; border-radius:14px; padding:15px; font:inherit; font-weight:650; font-size:1rem; cursor:pointer; transition:opacity .15s,transform .1s; }
    .cta:disabled{ opacity:.4; cursor:not-allowed; } .cta:not(:disabled):active{ transform:scale(.99); }
    .ghost{ background:rgba(47,125,107,.1); color:var(--accent); }
    .danger{ background:rgba(192,57,43,.1); color:#b33124; }
    .danger-solid{ background:#c0392b; color:#fff; }
    .grp{ font-size:.74rem; letter-spacing:.12em; text-transform:uppercase; color:var(--soft); font-weight:700; margin:18px 0 10px; }
    .grp:first-child{ margin-top:0; }
    .confirmbox{ border:1.5px solid rgba(192,57,43,.4); background:rgba(192,57,43,.05); border-radius:14px; padding:14px; margin-top:14px; }
    .confirmbox p{ margin:0 0 10px; font-size:.9rem; } .confirmbox .row2{ display:flex; gap:8px; }
    .confirmbox button{ flex:1; border:none; border-radius:11px; padding:12px; font:inherit; font-weight:650; cursor:pointer; }

    .link-box{ display:flex; gap:8px; margin-top:8px; }
    .link-box input{ flex:1; font:inherit; font-size:.82rem; padding:11px 12px; border:1.5px solid var(--line); border-radius:11px; background:#f7f9fb; color:var(--ink); }
    .copy{ background:var(--accent); color:#fff; border:none; border-radius:11px; padding:0 16px; font-weight:650; cursor:pointer; }

    .status{ display:inline-flex; align-items:center; gap:7px; font-size:.85rem; font-weight:650; padding:6px 12px; border-radius:999px; }
    .status.wait{ background:rgba(232,163,61,.16); color:#9a6a12; }
    .status.rep{ background:rgba(47,128,181,.14); color:#1f5e88; }
    .status.ok{ background:rgba(47,158,107,.14); color:#1f7a4d; }
    .pin{ width:8px; height:8px; border-radius:50%; background:currentColor; }

    .pref{ display:flex; align-items:center; gap:12px; border:1.5px solid var(--line); border-radius:14px; padding:12px 14px; margin-bottom:9px; cursor:pointer; transition:.13s; background:#fff; width:100%; text-align:left; font:inherit; }
    .pref:hover{ border-color:var(--accent); } .pref.chosen{ border-color:var(--ok); box-shadow:0 0 0 3px rgba(47,158,107,.16); }
    .pref .rkb{ width:30px; height:30px; border-radius:8px; flex:none; color:#fff; font-weight:700; display:grid; place-items:center; font-size:.9rem; }
    .pref .pj{ font-weight:600; } .pref .ph{ font-size:.85rem; color:var(--soft); } .pref .go{ margin-left:auto; font-size:.78rem; color:var(--accent); font-weight:650; }

    .foot{ text-align:center; font-size:.76rem; color:var(--soft); padding:0 22px 22px; }

    .done{ padding:42px 26px 40px; text-align:center; }
    .check{ width:74px; height:74px; border-radius:50%; margin:0 auto 16px; background:rgba(47,158,107,.12); display:grid; place-items:center; }
    .check svg{ width:36px; height:36px; }
    .check .path{ stroke-dasharray:40; stroke-dashoffset:40; animation:draw .5s .15s forwards ease; }
    @keyframes draw{ to{ stroke-dashoffset:0; } }
    .done h2{ margin:0 0 8px; font-size:1.34rem; } .done p{ margin:0 0 4px; color:var(--soft); line-height:1.5; }
    .reclist{ margin-top:16px; text-align:left; }

    .invitcard{ padding:30px 24px 36px; text-align:center; }
    .ribbon{ display:inline-block; font-size:.72rem; letter-spacing:.16em; text-transform:uppercase; font-weight:700; color:#9a4f8f; background:rgba(154,79,143,.1); padding:6px 14px; border-radius:999px; margin-bottom:14px; }
    .bigdate{ font-size:1.5rem; font-weight:700; margin:6px 0 2px; } .bightime{ font-size:1.05rem; color:var(--soft); margin-bottom:18px; }

    .item{ display:block; text-decoration:none; color:inherit; border:1px solid var(--line); border-radius:14px; padding:13px 15px; margin-bottom:10px; transition:.13s; }
    .item:hover{ border-color:var(--accent); } .item.past{ opacity:.62; }
    .item .l1{ display:flex; align-items:center; gap:10px; } .item .ent{ font-weight:650; }
    .item .l2{ font-size:.83rem; color:var(--soft); margin-top:4px; }

    .center{ padding:44px 22px; text-align:center; color:var(--soft); }
    .spin{ width:30px; height:30px; border:3px solid var(--line); border-top-color:var(--accent); border-radius:50%; margin:0 auto 14px; animation:rot .8s linear infinite; }
    @keyframes rot{ to{ transform:rotate(360deg); } }
    .toast{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px); background:#1c2530; color:#fff; padding:11px 18px; border-radius:10px; font-size:.86rem; opacity:0; pointer-events:none; transition:.25s; z-index:9; }
    .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
    .hidden{ display:none !important; }

    /* lisibilité mobile — police agrandie */
    .intro{ font-size:1.06rem; }
    .recap .row{ font-size:.98rem; }
    .ask{ font-size:1.1rem; }
    .sub{ font-size:.9rem; }
    .chip{ font-size:1rem; padding:11px 15px; }
    .day-h .lbl{ font-size:1.06rem; }
    .day-h .win{ font-size:.86rem; }
    .legend{ font-size:.85rem; }
    .pref .pj{ font-size:1.02rem; } .pref .ph{ font-size:.9rem; }
    .item .ent{ font-size:1.05rem; } .item .l2{ font-size:.9rem; }
    .bigmail{ width:100%; font:inherit; font-size:1.08rem; padding:14px; border:1.5px solid var(--line);
      border-radius:12px; background:#fff; color:var(--ink); margin-top:2px; }
    .bigmail:focus{ border-color:var(--accent); outline:none; box-shadow:0 0 0 3px rgba(47,125,107,.14); }
    @media (max-width:430px){ .top h1{ font-size:1.4rem; } .intro{ font-size:1.1rem; } .chip{ font-size:1.04rem; } }

    .filters{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
    .fchip{ border:1.5px solid var(--line); background:#fff; color:var(--ink); border-radius:999px; padding:8px 15px; font:inherit; font-size:.92rem; cursor:pointer; transition:.13s; }
    .fchip:hover{ border-color:var(--accent); } .fchip.on{ background:var(--accent); border-color:var(--accent); color:#fff; }
    .filtag{ display:inline-block; background:rgba(47,125,107,.12); color:var(--accent); border-radius:6px; padding:1px 8px; font-size:.78rem; font-weight:700; margin-right:6px; }
  </style>
</head>
<body>
  <div class="sheet"><div id="app"><div class="center"><div class="spin"></div>Chargement…</div></div></div>
  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAWdCMvOiAJln3eT9LIAQD3RWJUD0lQcLI",
      authDomain: "devoirs-pse.firebaseapp.com", projectId: "devoirs-pse",
      storageBucket: "devoirs-pse.firebasestorage.app", messagingSenderId: "614730413904",
      appId: "1:614730413904:web:a5dd478af5de30f6bede55"
    };
    const db = getFirestore(initializeApp(firebaseConfig));
    const COL = "coordination_rdv";
    const PORTAIL = "https://preventionsanteenvironnement.github.io/coordination-pedagogie/";

    const app$ = document.getElementById("app");
    const params = new URLSearchParams(location.search);
    const rid = params.get("r");
    const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    const lsAdmin = id => "coordrdv_admin_" + id;
    let toastT;
    const toast = m => { const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show");
      clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2200); };
    const initiales = s => String(s||"").replace(/[^A-Za-zÀ-ÿ ]/g,"").split(/\s+/).filter(Boolean).map(w=>w[0]).join("").slice(0,2).toUpperCase() || "•";

    const MOIS = ["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];
    const fmtH = min => { const h=Math.floor(min/60), m=min%60; return m===0?`${h} h`:`${h} h ${String(m).padStart(2,"0")}`; };
    const pad = n => String(n).padStart(2,"0");
    function libelle(dateStr){ const dt=new Date(dateStr+"T00:00:00"); if(isNaN(dt)) return {jour:dateStr,d:"",m:""};
      const j=dt.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
      return { jour:j.charAt(0).toUpperCase()+j.slice(1), d:String(dt.getDate()), m:MOIS[dt.getMonth()] }; }
    const STEP = 15;
    const genCreneaux = (start,end,duree) => { const out=[]; for(let s=start; s+duree<=end; s+=STEP) out.push({ start:s, end:s+duree, label:`${fmtH(s)} – ${fmtH(s+duree)}` }); return out; };
    const dureeLabel = m => m%60===0 ? (m/60)+" h" : (m<60? m+" min" : Math.floor(m/60)+" h "+(m%60));

    const PRIO = [ {c:"#1f9d57",t:"1ᵉʳ choix"}, {c:"#2f80b5",t:"2ᵉ choix"}, {c:"#7a5cc0",t:"3ᵉ choix"}, {c:"#c77d2b",t:"4ᵉ choix"} ];
    const prio = r => PRIO[r-1] || { c:"#6b7785", t:r+"ᵉ choix" };
    const DAYCOL = ["#3b6ea5","#5a8a3c","#9a5ba5","#c97a2b","#2f8f83","#c0392b","#5a6ea0"];

    // ---- Agenda + envoi ----
    const dtICS = (dateStr,min) => { const [Y,M,D]=dateStr.split("-"); return `${Y}${M}${D}T${pad(Math.floor(min/60))}${pad(min%60)}00`; };
    const icsEsc = s => String(s||"").replace(/([,;\\])/g,"\\$1").replace(/\n/g,"\\n");
    function icsHref(d){ const c=d.confirme; const ics=[
      "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//coordination-pedagogie//rdv//FR","BEGIN:VEVENT",
      "DTSTART:"+dtICS(c.dateStr,c.start),"DTEND:"+dtICS(c.dateStr,c.end),
      "SUMMARY:"+icsEsc("Visite PFMP — "+d.entreprise),
      "DESCRIPTION:"+icsEsc("Visite de stage (PFMP)"+(d.enseignant?" avec "+d.enseignant:"")),
      "LOCATION:"+icsEsc(d.entreprise),"END:VEVENT","END:VCALENDAR"].join("\r\n");
      return "data:text/calendar;charset=utf-8,"+encodeURIComponent(ics); }
    function gcalHref(d){ const c=d.confirme; const u=new URL("https://calendar.google.com/calendar/render");
      u.searchParams.set("action","TEMPLATE"); u.searchParams.set("text","Visite PFMP — "+d.entreprise);
      u.searchParams.set("dates",dtICS(c.dateStr,c.start)+"/"+dtICS(c.dateStr,c.end));
      u.searchParams.set("details","Visite de stage (PFMP)"+(d.enseignant?" avec "+d.enseignant:"")); u.searchParams.set("location",d.entreprise); return u.toString(); }
    function defaultMsg(d,url){ const c=d.confirme;
      return `Bonjour${d.tuteur?" "+d.tuteur:""},\n\nJe vous confirme notre rendez-vous pour la visite de PFMP :\n${c.jour}, de ${c.label}\nLieu : ${d.entreprise}\n\nVous pouvez voir la confirmation et l'ajouter à votre agenda ici :\n${url}\n\nBien cordialement${d.enseignant?",\n"+d.enseignant:""}`; }

    // ---- chargement robuste (1 nouvelle tentative) ----
    async function getRdv(id){ try{ return await getDoc(doc(db,COL,id)); }
      catch(e){ await new Promise(r=>setTimeout(r,700)); return await getDoc(doc(db,COL,id)); } }

    // ===================================================================  ROUTAGE
    async function router(){
      if(params.has("suivi")) return vueSuivi();
      if(!rid) return vueCreation();
      let snap; try{ snap = await getRdv(rid); }
      catch(e){ return erreur("Connexion impossible pour le moment. Vérifiez votre réseau puis rechargez la page.", true); }
      if(!snap.exists()) return erreur("Ce lien de rendez-vous n'existe pas ou a été supprimé.");
      const data = snap.data();
      if(localStorage.getItem(lsAdmin(rid))) return vueGestion(rid, data);
      return vueTuteur(rid, data);
    }
    const erreur = (msg,reload) => { app$.innerHTML = `<div class="center"><p style="font-size:1.05rem;color:var(--ink)">${esc(msg)}</p>
      ${reload?`<button class="cta" onclick="location.reload()" style="max-width:220px;margin:14px auto 0">Recharger</button>`:""}</div>`; };

    const heureOptions = (sel) => { let o=""; for(let m=7*60;m<=19*60;m+=STEP){ const v=`${pad(Math.floor(m/60))}:${pad(m%60)}`;
      o+=`<option value="${v}"${v===sel?" selected":""}>${fmtH(m)}</option>`; } return o; };
    const toMin = t => { const [h,m]=t.split(":").map(Number); return h*60+m; };
    const durOptions = (sel) => [15,30,45,60,75,90,105,120,150,180].map(m=>`<option value="${m}"${m===sel?" selected":""}>${dureeLabel(m)}</option>`).join("");

    // ===================================================================  1) CRÉATION
    function vueCreation(){
      app$.innerHTML = `
        <div class="top"><a class="back" href="${PORTAIL}">← Portail</a>
          <div class="label">PFMP · visite de stage</div><h1>Proposer une date au tuteur</h1></div>
        <div class="body">
          <div class="field"><label>Structure / entreprise</label><input id="f-ent" placeholder="ex. Centre social Les Tilleuls"></div>
          <div class="field"><label>Filière <span style="font-weight:400;color:var(--soft)">— pour ranger vos rendez-vous</span></label>
            <div class="seg" id="seg-fil">
              <button data-v="MELEC">MELEC</button><button data-v="AGOrA">AGOrA</button>
              <button data-v="CAP PSR">CAP PSR</button><button data-v="__autre">Autre…</button>
            </div>
            <input id="f-fil-autre" class="hidden" placeholder="Précisez la filière (ex. CAP EPC)" style="margin-top:8px"></div>
          <div class="field"><label>E-mail du tuteur <span style="font-weight:400;color:var(--soft)">— pour la confirmation</span></label>
            <input id="f-temail" type="email" placeholder="facultatif"><div class="hint">Le tuteur pourra le vérifier / corriger.</div></div>
          <div class="field"><label>Nom du tuteur <span style="font-weight:400;color:var(--soft)">— facultatif</span></label><input id="f-tut" placeholder="facultatif"></div>
          <div class="field"><label>Votre nom (enseignant) <span style="font-weight:400;color:var(--soft)">— facultatif</span></label><input id="f-ens" placeholder="facultatif"></div>

          <div class="field"><label>Type de rendez-vous</label>
            <div class="seg" id="seg-typ">
              <button data-v="Visite sur site" class="on">Visite sur site</button>
              <button data-v="Entretien téléphonique">Téléphone</button>
              <button data-v="Visioconférence">Visio</button>
              <button data-v="Bilan de fin de PFMP">Bilan PFMP</button>
              <button data-v="__autre">Autre…</button>
            </div>
            <input id="f-typ-autre" class="hidden" placeholder="Précisez le type" style="margin-top:8px"></div>

          <div class="field"><label>Durée du rendez-vous</label>
            <div class="seg" id="seg-dur">
              <button data-v="15">15 min</button><button data-v="30">30 min</button>
              <button data-v="45" class="on">45 min</button><button data-v="60">1 h</button>
              <button data-v="90">1 h 30</button><button data-v="__autre">Autre…</button>
            </div>
            <div id="dur-autre" class="hidden two" style="margin-top:8px">
              <div class="field" style="margin:0"><label>Heures</label><select id="dur-h">${[0,1,2,3].map(h=>`<option value="${h}">${h} h</option>`).join("")}</select></div>
              <div class="field" style="margin:0"><label>Minutes</label><select id="dur-m">${[0,5,10,15,20,25,30,35,40,45,50,55].map(m=>`<option value="${m}">${pad(m)} min</option>`).join("")}</select></div>
            </div></div>

          <div class="field"><label>Jours et plages que vous proposez</label>
            <div class="jour-list" id="jour-list"></div>
            <div class="three">
              <div class="field" style="margin:0"><label>Jour</label><input type="date" id="j-date"></div>
              <div class="field" style="margin:0"><label>De</label><select id="j-deb">${heureOptions("09:00")}</select></div>
              <div class="field" style="margin:0"><label>À</label><select id="j-fin">${heureOptions("12:00")}</select></div>
            </div>
            <button class="addbtn" id="j-add" type="button">+ Ajouter ce jour</button>
            <div class="hint">Proposez large : le tuteur choisira plusieurs créneaux et les classera par préférence. Chaque jour a sa couleur.</div></div>

          <button class="cta" id="creer" disabled>Créer et obtenir le lien</button>
        </div>
        <div class="foot">Aucune donnée d'élève (ni nom, ni initiales, ni classe). Seuls la structure et le contact professionnel du tuteur figurent ici.</div>`;

      let type="Visite sur site";
      const segT=document.getElementById("seg-typ"), autre=document.getElementById("f-typ-autre");
      segT.querySelectorAll("button").forEach(b=>b.onclick=()=>{ segT.querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on");
        if(b.dataset.v==="__autre"){ autre.classList.remove("hidden"); autre.focus(); type=autre.value.trim(); } else { autre.classList.add("hidden"); type=b.dataset.v; } valide(); });
      autre.addEventListener("input",()=>{ type=autre.value.trim(); valide(); });

      let filiere="";
      const segF=document.getElementById("seg-fil"), filAutre=document.getElementById("f-fil-autre");
      segF.querySelectorAll("button").forEach(b=>b.onclick=()=>{ segF.querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on");
        if(b.dataset.v==="__autre"){ filAutre.classList.remove("hidden"); filAutre.focus(); filiere=filAutre.value.trim(); }
        else { filAutre.classList.add("hidden"); filiere=b.dataset.v; } });
      filAutre.addEventListener("input",()=>{ filiere=filAutre.value.trim(); });

      let duree=45;
      const segD=document.getElementById("seg-dur"), durAutre=document.getElementById("dur-autre"),
            durH=document.getElementById("dur-h"), durM=document.getElementById("dur-m");
      const lirAutre=()=>{ duree=(+durH.value)*60+(+durM.value); };
      segD.querySelectorAll("button").forEach(b=>b.onclick=()=>{ segD.querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on");
        if(b.dataset.v==="__autre"){ durAutre.classList.remove("hidden"); durH.value=Math.floor(duree/60); durM.value=duree%60-(duree%60)%5; lirAutre(); }
        else { durAutre.classList.add("hidden"); duree=+b.dataset.v; } renderList(); });
      durH.onchange=()=>{ lirAutre(); renderList(); }; durM.onchange=()=>{ lirAutre(); renderList(); };

      const jours=[]; const listEl=document.getElementById("jour-list");
      function renderList(){
        listEl.innerHTML = jours.map((j,i)=>{ const n=genCreneaux(j.start,j.end,duree).length;
          return `<div class="jour-item" style="--jc:${j.col}"><div><div>${esc(j.jour)}</div>
            <div class="meta2">${fmtH(j.start)} – ${fmtH(j.end)} · ${n} créneau${n>1?"x":""}</div></div>
            <button class="x" data-i="${i}" type="button" aria-label="Retirer">×</button></div>`; }).join("");
        listEl.querySelectorAll(".x").forEach(b=>b.onclick=()=>{ jours.splice(+b.dataset.i,1); renderList(); valide(); });
      }
      document.getElementById("j-add").onclick=()=>{
        const date=document.getElementById("j-date").value; if(!date){ toast("Choisissez un jour."); return; }
        const start=toMin(document.getElementById("j-deb").value), end=toMin(document.getElementById("j-fin").value);
        if(end-start<duree){ toast("La plage est plus courte que la durée choisie."); return; }
        const L=libelle(date); jours.push({dateStr:date,jour:L.jour,d:L.d,m:L.m,start,end,col:DAYCOL[jours.length%DAYCOL.length]});
        renderList(); valide();
      };
      const entEl=document.getElementById("f-ent");
      function valide(){ document.getElementById("creer").disabled=!(entEl.value.trim() && type && duree>=5 && jours.length>=1); }
      entEl.addEventListener("input",valide);

      document.getElementById("creer").onclick=async()=>{
        const btn=document.getElementById("creer"); btn.disabled=true; btn.textContent="Création…";
        const payload={ enseignant:document.getElementById("f-ens").value.trim(), tuteur:document.getElementById("f-tut").value.trim(),
          tuteurEmail:document.getElementById("f-temail").value.trim(),
          entreprise:entEl.value.trim(), filiere, type, duree,
          jours:jours.map(j=>({dateStr:j.dateStr,jour:j.jour,d:j.d,m:j.m,start:j.start,end:j.end,col:j.col})),
          choix:null, confirme:null, statut:"attente", createdAt:serverTimestamp() };
        try{ const ref=await addDoc(collection(db,COL),payload); localStorage.setItem(lsAdmin(ref.id),"1"); location.search="?r="+ref.id; }
        catch(e){ btn.disabled=false; btn.textContent="Créer et obtenir le lien"; toast("Erreur à l'enregistrement. Réessayez."); }
      };
    }

    // ===================================================================  2) VUE TUTEUR
    function vueTuteur(id, d){
      if(d.confirme) return carteConfirmee(d);
      if(d.statut!=="attente" && d.choix) return confirmation(d.choix, true);
      app$.innerHTML = `
        <div class="top"><div class="label">PFMP · visite de stage</div>
          <div class="who"><div class="avatar">${esc(d.enseignant?initiales(d.enseignant):"📍").slice(0,2)}</div>
            <div><div class="name">${d.enseignant?esc(d.enseignant):"Rendez-vous de visite"}</div><div class="role">${d.enseignant?"Enseignant référent":"Suivi de stage en entreprise"}</div></div></div></div>
        <div class="body">
          <p class="intro">Bonjour${d.tuteur?`, <strong>${esc(d.tuteur)}</strong>`:""}.<br>
            Pour le suivi du stage en entreprise (rendez-vous d'environ ${d.duree} min), indiquez les créneaux qui vous conviennent
            <strong>en les classant par ordre de préférence</strong>.</p>
          <div class="recap">
            <div class="row"><span class="k">Structure</span><span class="v">${esc(d.entreprise)}</span></div>
            <div class="row"><span class="k">Type</span><span class="v">${esc(d.type)}</span></div></div>
          <p class="ask">Touchez vos créneaux par ordre de préférence</p>
          <p class="sub">Le 1<sup>er</sup> touché est votre choix idéal. Touchez-en plusieurs ; re-touchez pour retirer.</p>
          <div class="legend"><span><i style="background:#1f9d57"></i>1ᵉʳ</span><span><i style="background:#2f80b5"></i>2ᵉ</span><span><i style="background:#7a5cc0"></i>3ᵉ</span><span><i style="background:#c77d2b"></i>4ᵉ+</span></div>
          <div id="jours"></div>
          <p class="ask" style="margin-top:6px">Votre e-mail</p>
          <p class="sub">Pour recevoir la confirmation de votre rendez-vous.</p>
          <input id="contact-val" type="email" inputmode="email" autocomplete="email" class="bigmail" placeholder="prenom.nom@exemple.fr">
          <div class="hint" id="contact-hint">Vérifiez bien votre adresse avant d'envoyer.</div>
          <button class="cta" id="ok" disabled>Envoyer mes préférences</button>
        </div>
        <div class="foot">Aucune inscription — vos préférences sont transmises directement à l'enseignant.</div>`;

      const prefs=[]; const wrap=document.getElementById("jours"), ok=document.getElementById("ok");
      const key=(ji,s)=>ji+"_"+s;
      function paint(){
        wrap.innerHTML = d.jours.map((j,ji)=>`
          <div class="day" style="--jc:${j.col||'var(--accent)'}">
            <div class="day-h"><div class="cal" style="background:${j.col||'var(--accent)'}"><span class="d">${esc(j.d)}</span><span class="m">${esc(j.m)}</span></div>
              <div><div class="lbl">${esc(j.jour)}</div><div class="win">de ${fmtH(j.start)} à ${fmtH(j.end)}</div></div></div>
            <div class="chips">${genCreneaux(j.start,j.end,d.duree).map(c=>{ const r=prefs.findIndex(p=>p.key===key(ji,c.start)); const on=r>=0; const col=on?prio(r+1).c:"";
              return `<button class="chip ${on?"on":""}" data-j="${ji}" data-s="${c.start}" data-e="${c.end}" data-l="${esc(c.label)}" style="${on?`background:${col};box-shadow:0 0 0 1px ${col}`:""}">${esc(c.label)}${on?`<span class="rk" style="color:${col}">${r+1}</span>`:""}</button>`; }).join("")}</div>
          </div>`).join("");
        wrap.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{ const ji=+b.dataset.j, s=+b.dataset.s, k=key(ji,s); const i=prefs.findIndex(p=>p.key===k);
          if(i>=0) prefs.splice(i,1); else { const j=d.jours[ji]; prefs.push({key:k,dateStr:j.dateStr,jour:j.jour,d:j.d,m:j.m,start:s,end:+b.dataset.e,label:b.dataset.l}); }
          paint(); maj(); });
      }

      // e-mail pré-rempli, vérifiable / corrigeable — requis pour la confirmation
      const cval=document.getElementById("contact-val");
      cval.value = d.tuteurEmail || "";
      const emailOK = () => /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(cval.value.trim());
      const maj = () => { ok.disabled = !(prefs.length>0 && emailOK()); };
      cval.addEventListener("input", maj);
      paint(); maj();

      ok.onclick=async()=>{ ok.disabled=true; ok.textContent="Envoi…";
        const choix={ prefs:prefs.map(({key,...p})=>p), contact:{mode:"email", value:cval.value.trim()} };
        try{ await updateDoc(doc(db,COL,id),{ choix, statut:"repondu", respondedAt:serverTimestamp() }); confirmation(choix, false); }
        catch(e){ ok.textContent="Envoyer mes préférences"; maj(); toast("Erreur d'envoi. Réessayez."); }
      };
    }

    function confirmation(choix, deja){
      const prefs=choix.prefs||[];
      app$.innerHTML = `
        <div class="done">
          <div class="check"><svg viewBox="0 0 52 52"><path class="path" fill="none" stroke="#2f9e6b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" d="M14 27 l8 8 l16 -18"/></svg></div>
          <h2>${deja?"Vos préférences sont déjà enregistrées":"C'est noté, merci !"}</h2>
          <p>Vos préférences ont bien été transmises à l'enseignant.<br><strong>Vous recevrez une confirmation prochainement.</strong><br>Vous pouvez fermer cette page.</p>
          <div class="reclist">${prefs.map((p,i)=>{ const c=prio(i+1); return `<div class="pref"><div class="rkb" style="background:${c.c}">${i+1}</div>
            <div><div class="pj">${esc(p.jour)}</div><div class="ph">${esc(p.label)}</div></div></div>`; }).join("")}</div>
        </div>`;
      window.scrollTo({top:0,behavior:"smooth"});
    }

    // ---- Carte d'invitation reçue par le tuteur ----
    function carteConfirmee(d){
      const c=d.confirme;
      app$.innerHTML = `
        <div class="top invit"><div class="label">Visite de stage</div><h1>Votre rendez-vous est confirmé</h1></div>
        <div class="invitcard">
          <span class="ribbon">Invitation</span>
          <div class="check"><svg viewBox="0 0 52 52"><path class="path" fill="none" stroke="#2f9e6b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" d="M14 27 l8 8 l16 -18"/></svg></div>
          <p style="margin:0 0 2px;color:var(--soft)">${d.enseignant?esc(d.enseignant)+" vous donne rendez-vous":"Rendez-vous confirmé pour la visite de stage"}</p>
          <div class="bigdate">${esc(c.jour)}</div>
          <div class="bightime">${esc(c.label)}</div>
          <div class="recap" style="text-align:left;max-width:340px;margin:0 auto 20px">
            <div class="row"><span class="k">Structure</span><span class="v">${esc(d.entreprise)}</span></div>
            <div class="row"><span class="k">Type</span><span class="v">${esc(d.type)}</span></div></div>
          <a class="cta" href="${icsHref(d)}" download="rendez-vous-pfmp.ics" style="display:block;text-decoration:none">Ajouter à mon agenda</a>
          <a class="cta ghost" href="${gcalHref(d)}" target="_blank" rel="noopener" style="display:block;text-decoration:none;margin-top:10px">Ajouter à Google Agenda</a>
        </div>`;
      window.scrollTo({top:0,behavior:"smooth"});
    }

    // ===================================================================  3) GESTION
    function vueGestion(id, d0){
      const url = location.origin + location.pathname + "?r=" + id;
      function render(d){
        const prefs=(d.choix&&d.choix.prefs)||[]; const confirme=d.confirme;
        let statutHtml, corps;
        if(confirme){
          const ct=d.choix&&d.choix.contact; const email=(ct&&ct.mode==="email"&&ct.value)||d.tuteurEmail||"";
          statutHtml=`<span class="status ok"><span class="pin"></span>Confirmé</span>`;
          corps=`<div class="day" style="--jc:${confirme.col||'var(--ok)'}"><div class="day-h">
              <div class="cal" style="background:${confirme.col||'var(--ok)'}"><span class="d">${esc(confirme.d)}</span><span class="m">${esc(confirme.m)}</span></div>
              <div><div class="lbl">${esc(confirme.jour)}</div><div class="win">${esc(confirme.label)}</div></div></div></div>
            ${email?`<p class="ask" style="margin-top:16px">Prévenir le tuteur</p>
              <div class="recap"><div class="row"><span class="k">E-mail</span><span class="v">${esc(email)}</span></div></div>`:""}
            <p class="ask" style="margin-top:8px">Message de confirmation <span style="font-weight:400;color:var(--soft);font-size:.82rem">(modifiable)</span></p>
            <div class="field"><textarea id="confmsg">${esc(defaultMsg(d,url))}</textarea></div>
            ${email?`<button class="cta" id="send-mail">Envoyer par e-mail</button>`:""}
            <button class="cta ghost" id="copymsg">Copier le message</button>
            <button class="cta ghost" id="copyconf">Copier seulement le lien</button>
            <a class="cta ghost" href="${icsHref(d)}" download="rendez-vous-pfmp.ics" style="display:block;text-decoration:none">Ajouter à mon agenda</a>
            <button class="cta ghost" id="rouvrir">Changer de créneau</button>`;
        } else if(prefs.length){
          statutHtml=`<span class="status rep"><span class="pin"></span>Le tuteur (tutrice) a répondu</span>`;
          corps=`<p class="sub">Ses préférences, classées. Touchez celle que vous retenez pour confirmer le rendez-vous.</p>
            ${prefs.map((p,i)=>{ const c=prio(i+1); return `<button class="pref" data-i="${i}"><div class="rkb" style="background:${c.c}">${i+1}</div>
              <div><div class="pj">${esc(p.jour)}</div><div class="ph">${esc(p.label)} · ${c.t}</div></div><span class="go">Confirmer →</span></button>`; }).join("")}
            ${d.choix.contact&&d.choix.contact.mode==="email"&&d.choix.contact.value?`<p class="hint">E-mail laissé : <strong>${esc(d.choix.contact.value)}</strong></p>`:""}
            <div class="link-box" style="margin-top:14px"><input id="lien" readonly value="${esc(url)}"><button class="copy" id="copy">Copier</button></div>`;
        } else {
          statutHtml=`<span class="status wait"><span class="pin"></span>En attente de réponse</span>`;
          corps=`<p class="ask">Lien à envoyer au tuteur (tutrice)</p>
            <div class="link-box"><input id="lien" readonly value="${esc(url)}"><button class="copy" id="copy">Copier</button></div>
            <p class="hint" style="margin-top:6px">À coller dans votre e-mail au tuteur. Aucun compte à créer pour lui. Cette page se met à jour dès qu'il répond.</p>`;
        }
        app$.innerHTML = `
          <div class="top"><a class="back" href="?suivi">← Mes rendez-vous</a><div class="label">Visite de stage</div><h1>${esc(d.entreprise)}</h1></div>
          <div class="body">
            <div class="recap">
              ${d.filiere?`<div class="row"><span class="k">Filière</span><span class="v">${esc(d.filiere)}</span></div>`:""}
              ${d.tuteur?`<div class="row"><span class="k">Tuteur</span><span class="v">${esc(d.tuteur)}</span></div>`:""}
              <div class="row"><span class="k">Type</span><span class="v">${esc(d.type)} · ${d.duree} min</span></div></div>
            <div style="margin-bottom:14px">${statutHtml}</div>
            ${corps}
            <button class="cta ghost" id="nouveau" style="margin-top:16px">Créer un autre rendez-vous</button>
            <button class="cta danger" id="suppr" style="margin-top:10px">Supprimer ce rendez-vous</button>
            <div id="suppr-zone"></div>
            <a class="cta ghost" href="${PORTAIL}" style="display:block;text-decoration:none;margin-top:10px">← Retour au portail</a>
          </div>`;

        const bind=(id2,fn)=>{ const el=document.getElementById(id2); if(el) el.onclick=fn; };
        const copyText=async(t,msg)=>{ try{ await navigator.clipboard.writeText(t); toast(msg); }catch(e){ toast("Copie impossible."); } };
        bind("copy", ()=>copyText(url,"✓ Lien copié !"));
        bind("copyconf", ()=>copyText(url,"✓ Lien copié !"));
        bind("copymsg", ()=>copyText((document.getElementById("confmsg")||{}).value||url, "✓ Message copié !"));
        bind("send-mail", ()=>{ const ct=d.choix&&d.choix.contact; const to=(ct&&ct.mode==="email"&&ct.value)||d.tuteurEmail||"";
          const body=encodeURIComponent((document.getElementById("confmsg")||{}).value||"");
          location.href=`mailto:${to}?subject=${encodeURIComponent("Confirmation rendez-vous PFMP")}&body=${body}`; });
        bind("nouveau", ()=>{ location.search=""; });
        bind("rouvrir", async()=>{ await updateDoc(doc(db,COL,id),{confirme:null, statut:"repondu"}); });
        bind("suppr", ()=>{ const z=document.getElementById("suppr-zone"); const b=document.getElementById("suppr");
          b.style.display="none";
          z.innerHTML=`<div class="confirmbox"><p>Supprimer définitivement ce rendez-vous ? Cette action est irréversible.</p>
            <div class="row2"><button class="ghost" id="sa">Annuler</button><button class="danger-solid" id="sok">Oui, supprimer</button></div></div>`;
          document.getElementById("sa").onclick=()=>{ z.innerHTML=""; b.style.display=""; };
          document.getElementById("sok").onclick=async()=>{ document.getElementById("sok").textContent="Suppression…";
            try{ await deleteDoc(doc(db,COL,id)); localStorage.removeItem(lsAdmin(id)); location.search="?suivi"; }
            catch(e){ toast("Erreur lors de la suppression."); } };
        });
        app$.querySelectorAll(".pref[data-i]").forEach(b=>b.onclick=async()=>{ const p=prefs[+b.dataset.i];
          await updateDoc(doc(db,COL,id),{ confirme:p, statut:"confirme", confirmedAt:serverTimestamp() }); toast("✓ Rendez-vous confirmé !"); });
      }
      render(d0);
      onSnapshot(doc(db,COL,id), s=>{ if(s.exists()) render(s.data()); });
    }

    // ===================================================================  4) SUIVI
    async function vueSuivi(){
      const ids=Object.keys(localStorage).filter(k=>k.startsWith("coordrdv_admin_")).map(k=>k.slice("coordrdv_admin_".length));
      app$.innerHTML=`<div class="top"><a class="back" href="${PORTAIL}">← Portail</a><div class="label">Espace de gestion</div><h1>Mes rendez-vous PFMP</h1></div>
        <div class="body" id="liste"><div class="center"><div class="spin"></div>Chargement…</div></div>`;
      const liste=document.getElementById("liste");
      if(!ids.length){ liste.innerHTML=`<p class="sub" style="font-size:.92rem">Aucun rendez-vous pour l'instant.</p><button class="cta" id="nouv">Créer un rendez-vous</button>`;
        document.getElementById("nouv").onclick=()=>{ location.search=""; }; return; }
      const docs=await Promise.all(ids.map(async id=>{ try{ const s=await getRdv(id); return s.exists()?{id,...s.data()}:null; }catch(e){ return null; } }));
      const today=new Date(); today.setHours(0,0,0,0);
      const all=docs.filter(Boolean);
      const isPast=d=>d.confirme && new Date(d.confirme.dateStr+"T00:00:00")<today;
      const filVal=d=>d.filiere||"";
      const carte=d=>{ let chip,info; const past=isPast(d);
        if(d.confirme){ chip=`<span class="status ok" style="margin-left:auto"><span class="pin"></span>${past?"Passé":"Confirmé"}</span>`; info=`${esc(d.confirme.jour)} · ${esc(d.confirme.label)}`; }
        else if(d.choix&&d.choix.prefs&&d.choix.prefs.length){ chip=`<span class="status rep" style="margin-left:auto"><span class="pin"></span>À confirmer</span>`; info=`${d.choix.prefs.length} préférence${d.choix.prefs.length>1?"s":""} reçue${d.choix.prefs.length>1?"s":""}`; }
        else { chip=`<span class="status wait" style="margin-left:auto"><span class="pin"></span>En attente</span>`; info=`Lien envoyé — pas encore de réponse`; }
        const fil = filVal(d) ? `<span class="filtag">${esc(filVal(d))}</span>` : "";
        return `<a class="item ${past?"past":""}" href="?r=${d.id}"><div class="l1"><span class="ent">${esc(d.entreprise)}</span>${chip}</div>
          <div class="l2">${fil}${d.tuteur?esc(d.tuteur)+" — ":""}${info}</div></a>`; };
      const sortKey=d=>d.confirme?new Date(d.confirme.dateStr).getTime():(1e15-(d.createdAt?.seconds||0));
      const named=[...new Set(all.map(filVal).filter(Boolean))].sort();
      const hasVide=all.some(d=>!filVal(d));
      let cur="__all";
      function renderListe(){
        const sel=all.filter(d=> cur==="__all" ? true : (cur==="__none" ? !filVal(d) : filVal(d)===cur));
        const avenir=sel.filter(d=>!isPast(d)).sort((a,b)=>sortKey(a)-sortKey(b));
        const passes=sel.filter(isPast).sort((a,b)=>new Date(b.confirme.dateStr)-new Date(a.confirme.dateStr));
        const chips=(named.length||hasVide)?`<div class="filters">`
          +`<button class="fchip ${cur==='__all'?'on':''}" data-f="__all">Toutes</button>`
          +named.map(f=>`<button class="fchip ${cur===f?'on':''}" data-f="${esc(f)}">${esc(f)}</button>`).join("")
          +(hasVide?`<button class="fchip ${cur==='__none'?'on':''}" data-f="__none">Sans filière</button>`:"")
          +`</div>`:"";
        liste.innerHTML = chips
          + (avenir.length?`<div class="grp">À venir & à traiter</div>`+avenir.map(carte).join(""):"")
          + (passes.length?`<div class="grp">Passés</div>`+passes.map(carte).join(""):"")
          + (!avenir.length&&!passes.length?`<p class="sub" style="font-size:.92rem">Aucun rendez-vous ici.</p>`:"")
          + `<button class="cta" id="nouv" style="margin-top:12px">Créer un rendez-vous</button>`;
        liste.querySelectorAll(".fchip").forEach(b=>b.onclick=()=>{ cur=b.dataset.f; renderListe(); });
        document.getElementById("nouv").onclick=()=>{ location.search=""; };
      }
      renderListe();
    }

    router();
  </script>
</body>
</html>
